<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Shot List — by @mayathepm</title>
<meta name="description" content="The storyboard tool I couldn't afford, so I built it. One prompt, full board. Upload your own frames or auto-generate." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Newsreader:ital,opsz@0,6..72;1,6..72&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body { background:#141210; color:#e8e2d6; font-family:'IBM Plex Mono', monospace; }
  textarea, input, select, button { font-family: inherit; }
  :focus-visible { outline: 2px solid #c9a15e; outline-offset: 2px; }
  ::placeholder { color:#b3a68f; }
  summary { cursor:pointer; list-style:none; }
  summary::-webkit-details-marker { display:none; }

  .masthead { border-bottom:1px solid #2a2622; background:linear-gradient(180deg,#1a1714,#141210); }
  .masthead-inner { max-width:1400px; margin:0 auto; padding:22px 24px; }
  .logo-row { display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; }
  .logo-mark { font-size:26px; color:#c9a15e; line-height:1; }
  .logo-type { font-family:'Oswald',sans-serif; font-weight:700; font-size:30px; letter-spacing:.18em; color:#f4efe4; }
  .byline { font-size:12px; color:#8f8674; letter-spacing:.1em; }
  .tagline { margin:8px 0 0 38px; font-size:12.5px; color:#8f8674; letter-spacing:.04em; }

  .prompt-wrap { max-width:1400px; margin:0 auto; padding:24px 24px 8px; }
  .prompt-label { font-family:'Oswald',sans-serif; font-weight:600; font-size:13px; letter-spacing:.22em; color:#c9a15e; text-transform:uppercase; }
  .prompt-input { width:100%; margin-top:10px; background:#1e1a16; border:1px solid #332d26; border-radius:4px; color:#f0eadd; padding:14px 16px; font-size:14.5px; line-height:1.55; resize:vertical; }
  .prompt-actions { display:flex; gap:12px; margin-top:14px; flex-wrap:wrap; align-items:center; }
  .btn-primary { font-family:'Oswald',sans-serif; font-weight:600; letter-spacing:.1em; text-transform:uppercase; font-size:13.5px; background:#c9a15e; color:#141210; border:none; border-radius:4px; padding:12px 22px; cursor:pointer; }
  .btn-primary:disabled { opacity:.6; cursor:default; }
  .btn-ghost { font-family:'Oswald',sans-serif; font-weight:500; letter-spacing:.1em; text-transform:uppercase; font-size:13.5px; background:transparent; color:#c9a15e; border:1px solid #4a4034; border-radius:4px; padding:12px 18px; cursor:pointer; }
  .error { color:#e0885f; font-size:13px; margin-top:12px; }
  .hint { color:#6f6858; font-size:12px; margin-top:10px; line-height:1.5; }

  .style-set { display:inline-flex; align-items:center; gap:8px; }
  .style-set-label { font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:#8f8674; }
  .toggle { display:inline-flex; border:1px solid #4a4034; border-radius:4px; overflow:hidden; }
  .toggle button { background:transparent; color:#8f8674; border:none; padding:10px 16px; font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:.12em; text-transform:uppercase; cursor:pointer; }
  .toggle button.on { background:#c9a15e; color:#141210; }

  .key-drawer { max-width:1400px; margin:0 auto; padding:0 24px; }
  .key-summary { font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:#8f8674; padding:12px 0; border-top:1px solid #2a2622; }
  .key-body { display:flex; gap:10px; flex-wrap:wrap; align-items:center; padding-bottom:14px; }
  .key-input { flex:1; min-width:220px; background:#1e1a16; border:1px solid #332d26; border-radius:4px; color:#f0eadd; padding:9px 12px; font-size:13px; }
  .key-toggle { background:transparent; border:1px solid #3a332b; color:#8f8674; border-radius:4px; padding:8px 12px; font-size:12px; cursor:pointer; }
  .key-note { font-size:11.5px; color:#6f6858; flex-basis:100%; line-height:1.5; }
  .key-note a { color:#c9a15e; }

  .shared-strip { max-width:1400px; margin:16px auto 0; padding:14px 24px; display:flex; gap:28px; flex-wrap:wrap; border-top:1px solid #2a2622; border-bottom:1px solid #2a2622; background:#17140f; }
  .shared-item { display:flex; flex-direction:column; gap:5px; min-width:180px; flex:1; }
  .shared-key { font-size:10.5px; letter-spacing:.2em; color:#8f8674; text-transform:uppercase; }
  .shared-input { background:transparent; border:none; border-bottom:1px solid #3a332b; color:#e8e2d6; font-size:13px; padding:3px 0; }
  .title-input { background:transparent; border:none; border-bottom:1px solid #3a332b; color:#f4efe4; font-family:'Oswald',sans-serif; font-weight:600; letter-spacing:.08em; font-size:16px; padding:3px 0; }

  .empty { max-width:640px; margin:80px auto; text-align:center; padding:0 24px; }
  .empty-mark { font-size:30px; color:#332d26; letter-spacing:.3em; }
  .empty-text { color:#8f8674; font-size:14px; line-height:1.7; margin-top:20px; }

  .board-tools { max-width:1400px; margin:24px auto 0; padding:0 24px; display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
  .rotate-hint { color:#6f6858; font-size:11.5px; letter-spacing:.03em; }

  /* Storyboard grid — frames across, like a real board */
  .board { max-width:1400px; margin:16px auto 0; padding:0 24px 10px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(230px,1fr)); gap:18px; }
  .card { background:#f3ede0; border-radius:6px; overflow:hidden; border:1px solid #d8ccb4; display:flex; flex-direction:column; }
  .frame-shell { position:relative; aspect-ratio:4/3; overflow:hidden; background:#2a251f; }
  .frame-img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .frame-empty { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:10px; }
  .frame-empty-hint { font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:#8a7f6c; text-align:center; }
  .frame-btns { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
  .frame-btn { background:rgba(20,18,16,.9); color:#e8dcc4; border:1px solid #4a4034; border-radius:3px; padding:6px 9px; font-size:10.5px; letter-spacing:.05em; cursor:pointer; }
  .frame-btn.gen { color:#c9a15e; border-color:rgba(201,161,94,.5); }
  .frame-btn:disabled { opacity:.5; cursor:default; }
  .shot-badge { position:absolute; top:8px; left:8px; background:rgba(20,18,16,.82); color:#f4efe4; font-family:'Oswald',sans-serif; font-weight:600; letter-spacing:.12em; font-size:11px; border:none; border-radius:3px; padding:4px 8px; width:78px; z-index:2; }
  .frame-tools { position:absolute; bottom:8px; right:8px; display:flex; gap:5px; z-index:2; }
  .mini-btn { background:rgba(20,18,16,.82); color:#e8dcc4; border:1px solid #4a4034; border-radius:3px; padding:4px 7px; font-size:10px; cursor:pointer; }
  .mini-btn.gen { color:#c9a15e; border-color:rgba(201,161,94,.5); }
  .mini-btn:disabled { opacity:.5; cursor:default; }

  .spec-line { display:flex; flex-wrap:wrap; gap:5px; padding:9px 9px 5px; background:#ece4d3; border-bottom:1px solid #ddd0b8; }
  .chip { font-size:10px; background:#fff; border:1px solid #cdbfa2; border-radius:3px; padding:3px 5px; color:#3a3025; cursor:pointer; max-width:100%; }
  .dur-chip { font-size:10px; width:38px; background:#fff; border:1px solid #cdbfa2; border-radius:3px; padding:3px 5px; color:#3a3025; text-align:center; }
  .field { padding:8px 11px 0; }
  .field-label { font-family:'Oswald',sans-serif; font-weight:600; font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:#7a6a52; display:block; margin-bottom:4px; }
  .field-label.dir { color:#9a7b4f; }
  .field-input { width:100%; background:#fbf7ee; border:1px solid #ddd0b8; border-radius:4px; color:#3a3025; font-size:12.5px; line-height:1.45; padding:7px 9px; resize:vertical; font-family:'Newsreader',Georgia,serif; }
  .field-input.dir { font-style:italic; color:#5a4a35; }
  .prompt-details { padding:8px 11px 0; }
  .prompt-summary { font-family:'Oswald',sans-serif; font-weight:600; font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:#a08b68; }
  .prompt-edit { width:100%; margin-top:6px; background:#f0e9db; border:1px dashed #cdbfa2; border-radius:4px; color:#5a4a35; font-size:11.5px; line-height:1.4; padding:6px 8px; resize:vertical; }
  .remove-btn { margin:10px 11px 12px; background:transparent; border:1px solid #e0d3ba; color:#a08b68; font-size:10px; letter-spacing:.1em; text-transform:uppercase; border-radius:3px; padding:6px 0; cursor:pointer; }

  .cta { max-width:1400px; margin:48px auto 0; padding:36px 24px; text-align:center; border-top:1px solid #2a2622; background:linear-gradient(180deg,#141210,#1a1714); }
  .cta-lead { font-family:'Oswald',sans-serif; font-weight:700; font-size:22px; letter-spacing:.06em; color:#f4efe4; margin:0; }
  .cta-body { color:#9a9284; font-size:14px; line-height:1.7; max-width:520px; margin:12px auto 20px; }
  .cta-btn { display:inline-block; font-family:'Oswald',sans-serif; font-weight:600; letter-spacing:.1em; text-transform:uppercase; font-size:14px; background:#c9a15e; color:#141210; text-decoration:none; border-radius:4px; padding:13px 28px; }
  .footer { max-width:1400px; margin:0 auto; padding:28px 24px; color:#5c5548; font-size:12px; letter-spacing:.04em; text-align:center; }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script>
const { useState, useRef, createElement: h } = React;

const LENSES = ["24mm","35mm","50mm anamorphic","75mm anamorphic","100mm anamorphic","100mm macro"];
const MOVES = ["DOLLY-IN","HANDHELD","TRACK","ORBIT","STATIC","CRANE","WHIP PAN"];
const FRAMINGS = ["WIDE","MEDIUM","CLOSE-UP","EXTREME CU","LOW-ANGLE","TOP-DOWN"];

const SUBSTACK_URL = "https://nocompanyculture.substack.com/subscribe";
const TEXT_ENDPOINT = "https://text.pollinations.ai/openai";

const STYLE_SUFFIX = {
  sketch: ", black and white pencil storyboard sketch, rough gesture lines, loose hand-drawn, monochrome, minimal shading",
  photoreal: ", photorealistic, cinematic lighting, film still, shallow depth of field, high detail"
};

function shotSystemPrompt(brief){
  return 'You are a cinematographer breaking a brief into a 5-cut shot list for a short-form ad. BRIEF: "'+brief+'". Reply with ONLY valid JSON, no markdown fences, no preamble. Shape: {"title":"max 5 words","palette":"one line","environment":"one line","cuts":[{"shot":"CUT 1","duration":"3s","lens":"50mm anamorphic","move":"DOLLY-IN","framing":"WIDE","action":"one vivid sentence of what happens in frame","direction":"one sentence of performance/blocking direction","imagePrompt":"a rich standalone image prompt for this single frame"}]}. Vary lens, move, framing across the 5 cuts. Keep action and direction concrete and shootable.';
}

function App(){
  const [brief,setBrief] = useState("");
  const [title,setTitle] = useState("Untitled Board");
  const [cuts,setCuts] = useState([]);
  const [loading,setLoading] = useState(false);
  const [error,setError] = useState("");
  const [shared,setShared] = useState({palette:"",environment:""});
  const [falKey,setFalKey] = useState("");
  const [showKey,setShowKey] = useState(false);
  const [style,setStyle] = useState("sketch");
  const [downloading,setDownloading] = useState(false);
  const boardRef = useRef(null);

  async function generate(){
    if(!brief.trim()){ setError("Give the board something to work with — describe the ad or scene first."); return; }
    setError(""); setLoading(true);
    try{
      const res = await fetch(TEXT_ENDPOINT,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ model:"openai", messages:[{role:"user",content:shotSystemPrompt(brief)}] })
      });
      const data = await res.json();
      let text = "";
      if(typeof data === "string") text = data;
      else if(data.choices && data.choices[0]) text = data.choices[0].message ? data.choices[0].message.content : data.choices[0].text;
      else text = JSON.stringify(data);
      text = text.replace(/```json|```/g,"").trim();
      const first = text.indexOf("{"), last = text.lastIndexOf("}");
      if(first>=0 && last>=0) text = text.slice(first,last+1);
      const parsed = JSON.parse(text);
      setTitle(parsed.title||"Untitled Board");
      setShared({palette:parsed.palette||"",environment:parsed.environment||""});
      setCuts((parsed.cuts||[]).map((c,i)=>({
        id:Date.now()+i, shot:c.shot||("CUT "+(i+1)), duration:c.duration||"3s",
        lens:c.lens||"50mm anamorphic", move:c.move||"STATIC", framing:c.framing||"MEDIUM",
        action:c.action||"", direction:c.direction||"", imagePrompt:c.imagePrompt||c.action||"",
        img:null, imgLoading:false
      })));
    }catch(e){
      setError("The board didn't come back clean. Try again — or build it by hand below, it still works.");
    }finally{ setLoading(false); }
  }

  async function autoGen(id, imagePrompt){
    if(!falKey){ setError("Add your fal.ai key in the drawer up top to auto-generate — or use Upload to add your own image."); return; }
    setError("");
    setCuts(cs=>cs.map(c=>c.id===id?{...c,imgLoading:true}:c));
    try{
      const res = await fetch("https://fal.run/fal-ai/flux/schnell",{
        method:"POST",
        headers:{ Authorization:"Key "+falKey, "Content-Type":"application/json" },
        body:JSON.stringify({ prompt: imagePrompt + STYLE_SUFFIX[style], image_size:"landscape_4_3", num_images:1 })
      });
      if(!res.ok) throw new Error("fal");
      const data = await res.json();
      const url = data && data.images && data.images[0] && data.images[0].url;
      setCuts(cs=>cs.map(c=>c.id===id?{...c,img:url||null,imgLoading:false}:c));
    }catch(e){
      setError("That frame didn't render — check the key or your fal credits. Upload still works.");
      setCuts(cs=>cs.map(c=>c.id===id?{...c,imgLoading:false}:c));
    }
  }

  function uploadImg(id, file){
    if(!file) return;
    const reader = new FileReader();
    reader.onload = () => setCuts(cs=>cs.map(c=>c.id===id?{...c,img:reader.result}:c));
    reader.readAsDataURL(file);
  }
  function clearImg(id){ setCuts(cs=>cs.map(c=>c.id===id?{...c,img:null}:c)); }

  const upd = (id,f,v)=>setCuts(cs=>cs.map(c=>c.id===id?{...c,[f]:v}:c));
  const addFrame = ()=>setCuts(cs=>[...cs,{id:Date.now(),shot:"CUT "+(cs.length+1),duration:"3s",lens:"50mm anamorphic",move:"STATIC",framing:"MEDIUM",action:"",direction:"",imagePrompt:"",img:null,imgLoading:false}]);
  const rm = id=>setCuts(cs=>cs.filter(c=>c.id!==id));

  async function downloadBoard(){
    if(!boardRef.current || !window.html2canvas){ setError("Download needs a moment to load — try again."); return; }
    setDownloading(true); setError("");
    try{
      const canvas = await window.html2canvas(boardRef.current, {
        backgroundColor:"#141210", scale:2, useCORS:true, allowTaint:false
      });
      const link = document.createElement("a");
      link.download = (title||"storyboard").replace(/[^a-z0-9]+/gi,"-").toLowerCase()+".png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }catch(e){
      setError("Download hit a snag — uploaded frames export fine; a generated frame may block the capture.");
    }finally{ setDownloading(false); }
  }

  return h("div",null,
    h("header",{className:"masthead"},
      h("div",{className:"masthead-inner"},
        h("div",{className:"logo-row"},
          h("span",{className:"logo-mark"},"◐"),
          h("span",{className:"logo-type"},"SHOT LIST"),
          h("span",{className:"byline"},"by @mayathepm")
        ),
        h("p",{className:"tagline"},"The storyboard tool I couldn't afford, so I built it. One prompt, full board. I got you.")
      )
    ),

    h("section",{className:"prompt-wrap"},
      h("label",{className:"prompt-label"},"The brief"),
      h("textarea",{className:"prompt-input",rows:3,value:brief,
        placeholder:"A woman in a chrome heel sprints through a sunlit Italian alley, past a parked Vespa, and leaps between rooftops toward a dinner terrace. High-fashion, anamorphic, urgent.",
        onChange:e=>setBrief(e.target.value)}),
      h("div",{className:"prompt-actions"},
        h("button",{className:"btn-primary",onClick:generate,disabled:loading},
          loading?"Boarding the sequence…":"Generate Storyboard"),
        h("div",{className:"style-set"},
          h("span",{className:"style-set-label"},"Style"),
          h("div",{className:"toggle"},
            h("button",{className:style==="sketch"?"on":"",onClick:()=>setStyle("sketch")},"Sketch"),
            h("button",{className:style==="photoreal"?"on":"",onClick:()=>setStyle("photoreal")},"Photoreal")
          )
        )
      ),
      h("p",{className:"hint"},"No fal key needed to board a sequence. Fill each frame by uploading your own image, or auto-generate with a key. Style sets what Auto-generate draws."),
      error && h("p",{className:"error"},error)
    ),

    h("div",{className:"key-drawer"},
      h("details",null,
        h("summary",{className:"key-summary"},"▸ fal.ai key — optional, only for auto-generating frames"),
        h("div",{className:"key-body"},
          h("input",{className:"key-input",type:showKey?"text":"password",
            placeholder:"paste your own fal key — stays in your browser, never saved",
            value:falKey,onChange:e=>setFalKey(e.target.value)}),
          h("button",{className:"key-toggle",onClick:()=>setShowKey(s=>!s)},showKey?"hide":"show"),
          h("span",{className:"key-note"},"Your key lives only in this browser tab and is never uploaded or committed anywhere. Get one at ",
            h("a",{href:"https://fal.ai",target:"_blank",rel:"noreferrer"},"fal.ai"),
            " — Flux Schnell runs a fraction of a cent per frame.")
        )
      )
    ),

    (shared.palette||shared.environment) && h("section",{className:"shared-strip"},
      h("div",{className:"shared-item"},h("span",{className:"shared-key"},"Board"),
        h("input",{className:"title-input",value:title,onChange:e=>setTitle(e.target.value)})),
      h("div",{className:"shared-item"},h("span",{className:"shared-key"},"Palette"),
        h("input",{className:"shared-input",value:shared.palette,onChange:e=>setShared(s=>({...s,palette:e.target.value}))})),
      h("div",{className:"shared-item"},h("span",{className:"shared-key"},"Environment"),
        h("input",{className:"shared-input",value:shared.environment,onChange:e=>setShared(s=>({...s,environment:e.target.value}))}))
    ),

    (cuts.length===0 && !loading) && h("div",{className:"empty"},
      h("div",{className:"empty-mark"},"▤▤▤▤▤"),
      h("p",{className:"empty-text"},"Your board is empty. Write a brief above and Generate Storyboard — you'll get a row of cuts, each with its own frame, action, and direction you can rewrite by hand.")
    ),

    cuts.length>0 && h("div",{className:"board-tools"},
      h("button",{className:"btn-ghost",onClick:addFrame,disabled:loading},"+ Add Frame"),
      h("button",{className:"btn-primary",onClick:downloadBoard,disabled:downloading},
        downloading?"Rendering…":"⬇ Download Board"),
      h("span",{className:"rotate-hint"},"Turn your phone sideways to see the full board.")
    ),

    cuts.length>0 && h("div",{className:"board",ref:boardRef},
      h("div",{className:"grid"},
        cuts.map(c=>h(Cut,{key:c.id,cut:c,upd:upd,rm:rm,
          onUpload:uploadImg,onClear:clearImg,onGen:()=>autoGen(c.id,c.imagePrompt),hasKey:!!falKey,style:style}))
      )
    ),

    h("section",{className:"cta"},
      h("p",{className:"cta-lead"},"Built in the gap. Free for you."),
      h("p",{className:"cta-body"},"I couldn't drop $15/mo on a storyboard tool, so I made my own. Want the link to this, plus the tools I build next? Subscribe — I got you."),
      h("a",{className:"cta-btn",href:SUBSTACK_URL,target:"_blank",rel:"noreferrer"},"Subscribe on Substack →")
    ),

    h("footer",{className:"footer"},"Human in the loop. Every frame here is a draft waiting on your call.")
  );
}

function Cut(props){
  const c = props.cut;
  const fileRef = useRef(null);
  return h("article",{className:"card"},
    h("div",{className:"frame-shell"},
      c.img
        ? h("img",{className:"frame-img",src:c.img,alt:c.action,crossOrigin:"anonymous"})
        : h("div",{className:"frame-empty"},
            h("div",{className:"frame-empty-hint"}, c.imgLoading?("generating "+props.style+"…"):"empty frame"),
            h("div",{className:"frame-btns"},
              h("button",{className:"frame-btn",onClick:()=>fileRef.current && fileRef.current.click()},"⬆ Upload"),
              h("button",{className:"frame-btn gen",onClick:props.onGen,disabled:c.imgLoading,
                title: props.hasKey?"Auto-generate this frame":"Add your fal key to auto-generate"},
                c.imgLoading?"…":"✦ Auto-generate")
            )
          ),
      h("input",{className:"shot-badge",value:c.shot,onChange:e=>props.upd(c.id,"shot",e.target.value)}),
      c.img && h("div",{className:"frame-tools"},
        h("button",{className:"mini-btn",onClick:()=>fileRef.current && fileRef.current.click()},"replace"),
        h("button",{className:"mini-btn gen",onClick:props.onGen,disabled:c.imgLoading},c.imgLoading?"…":"↻"),
        h("button",{className:"mini-btn",onClick:()=>props.onClear(c.id)},"clear")
      ),
      h("input",{ref:fileRef,type:"file",accept:"image/*",style:{display:"none"},
        onChange:e=>{ props.onUpload(c.id, e.target.files[0]); e.target.value=""; }})
    ),

    h("div",{className:"spec-line"},
      h(Chip,{value:c.lens,options:LENSES,onChange:v=>props.upd(c.id,"lens",v)}),
      h(Chip,{value:c.move,options:MOVES,onChange:v=>props.upd(c.id,"move",v)}),
      h(Chip,{value:c.framing,options:FRAMINGS,onChange:v=>props.upd(c.id,"framing",v)}),
      h("input",{className:"dur-chip",value:c.duration,onChange:e=>props.upd(c.id,"duration",e.target.value)})
    ),

    h("div",{className:"field"},
      h("label",{className:"field-label"},"Action"),
      h("textarea",{className:"field-input",rows:2,value:c.action,
        placeholder:"What happens in frame…",onChange:e=>props.upd(c.id,"action",e.target.value)})
    ),
    h("div",{className:"field"},
      h("label",{className:"field-label dir"},"Direction"),
      h("textarea",{className:"field-input dir",rows:2,value:c.direction,
        placeholder:"Performance, blocking, emotional note…",onChange:e=>props.upd(c.id,"direction",e.target.value)})
    ),

    h("details",{className:"prompt-details"},
      h("summary",{className:"prompt-summary"},"image prompt"),
      h("textarea",{className:"prompt-edit",rows:3,value:c.imagePrompt,
        onChange:e=>props.upd(c.id,"imagePrompt",e.target.value)})
    ),

    h("button",{className:"remove-btn",onClick:()=>props.rm(c.id)},"Remove cut")
  );
}

function Chip(props){
  const opts = props.options.includes(props.value)?props.options:[props.value].concat(props.options);
  return h("select",{className:"chip",value:props.value,onChange:e=>props.onChange(e.target.value)},
    opts.map(o=>h("option",{key:o,value:o},o)));
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
